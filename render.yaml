services:
  - type: web
    name: doctorhub-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SKIP_DATABASE_CONNECTION
        value: "false" # Set to true if testing without Mongo, false for production connection
      - key: MONGODB_URI
        sync: false # Supply MongoDB Atlas connection URI
      - key: JWT_ACCESS_SECRET
        generateValue: true # Generates a secure random key automatically
      - key: JWT_REFRESH_SECRET
        generateValue: true # Generates a secure random key automatically
      - key: FRONTEND_URL
        sync: false # Supply Vercel frontend URL (e.g. https://your-app.vercel.app)
      - key: AI_PROVIDER
        value: "anthropic"
      - key: ANTHROPIC_API_KEY
        sync: false # Supply API Key for Claude AI assistant
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
